<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invila™ System Live - Monitor View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --panel-bg: #161b22;
            --accent-blue: #00a3ff;
        }

        body {
            background-color: #0f172a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* Container Utama Menggunakan Gambar PNG kamu */
        .monitor-wrapper {
            position: relative;
            width: 95%;
            max-width: 1100px;
            aspect-ratio: 16 / 9;
            /* DISESUAIKAN: Nama file sesuai gambar kamu */
            background-image: url('image_5a5ee9.png'); 
            background-size: cover;
            background-position: center;
            border-radius: 24px;
            border: 6px solid #ffffff;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        /* Area Overlay HMI pada Monitor */
        .hmi-screen-area {
            position: absolute;
            top: 2.2%; 
            left: 32.6%; 
            width: 40.8%; 
            height: 93.5%;
            background: var(--bg-dark);
            overflow-y: auto;
            border-radius: 2px;
            color: #e6edf3;
            /* Efek perspektif agar menyatu dengan layar miring */
            transform: perspective(1000px) rotateY(-1.5deg);
            padding: 5px;
        }

        /* Mini Dashboard inside monitor */
        .hmi-card {
            background: var(--panel-bg);
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 8px;
            margin-bottom: 6px;
        }

        .hmi-label { font-size: 0.5rem; color: #8b949e; text-transform: uppercase; }
        .hmi-value { font-size: 1.2rem; font-weight: 800; color: var(--accent-blue); }

        /* Animasi Aliran Air Kecil */
        .mini-pipe {
            height: 6px;
            background: #21262d;
            border-radius: 3px;
            position: relative;
            overflow: hidden;
            margin: 4px 0;
        }
        .mini-flow {
            position: absolute;
            height: 100%; width: 100%;
            background: linear-gradient(90deg, transparent, var(--accent-blue), transparent);
            animation: flowMove 2s linear infinite;
        }
        @keyframes flowMove {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }
    </style>
</head>
<body>

    <div class="monitor-wrapper">
        <div class="hmi-screen-area">
            <div class="flex justify-between items-center mb-3 border-b border-slate-700 pb-1">
                <span class="text-[10px] font-bold tracking-tighter">INVILA™ HMI</span>
                <span id="timer" class="text-[9px] text-cyan-400 font-mono">00:00:00</span>
            </div>

            <div class="hmi-card">
                <p class="hmi-label">Total Production</p>
                <div class="hmi-value" id="prod-val">1.245</div>
                <p class="text-[7px] text-green-500 font-bold">● SYSTEM OPTIMAL</p>
            </div>

            <div class="hmi-card">
                <p class="hmi-label">Water Treatment Flow</p>
                <div class="mini-pipe"><div class="mini-flow"></div></div>
                <p class="text-[6px] text-slate-500 italic">Live Data: Siemens S7-1200</p>
            </div>

            <div class="hmi-card">
                <p class="hmi-label">Current TDS</p>
                <div class="hmi-value">185 <span class="text-[8px]">PPM</span></div>
            </div>
        </div>

        <div class="absolute bottom-6 left-8 flex items-center gap-2 bg-black/40 backdrop-blur-sm px-3 py-1 rounded-full">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-[9px] font-black text-white uppercase tracking-widest">DECN-IV™ System Live</span>
        </div>
    </div>

    <script>
        // Update jam HMI
        function startClock() {
            const now = new Date();
            document.getElementById('timer').innerText = now.toLocaleTimeString('id-ID');
        }
        setInterval(startClock, 1000);

        // Simulasi data produksi
        let val = 1245;
        setInterval(() => {
            val += Math.floor(Math.random() * 2);
            document.getElementById('prod-val').innerText = val.toLocaleString();
        }, 4000);
    </script>
</body>
</html>
