<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invila™ HMI - Operator View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --panel-bg: #161b22;
            --accent-blue: #00a3ff;
        }

        body {
            background-color: #05070a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Container Utama (Foto Background) */
        .monitor-frame {
            position: relative;
            width: 95vw;
            max-width: 1200px;
            aspect-ratio: 16 / 9;
            background-image: url('image_5a5ee9.png');
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            border: 4px solid #222;
        }

        /* Area HMI - Kunci utama kemiringan dan masking */
        .hmi-overlay {
            position: absolute;
            top: 2.2%; 
            left: 33.3%; 
            width: 40.2%; 
            height: 93.8%;
            background: var(--bg-dark);
            color: #e6edf3;
            padding: 18px;
            
            /* 1. EFEK MIRING: Mengikuti sudut monitor AOC */
            transform: perspective(1500px) rotateY(-17deg) rotateX(1deg) skewY(1.2deg);
            transform-origin: left center;

            /* 2. EFEK TERHALANG: Memotong area kanan bawah agar terlingi bahu operator */
            /* Titik-titik ini membuat potongan miring di sisi kanan */
            clip-path: polygon(
                0% 0%,       /* Top Left */
                100% 0%,     /* Top Right */
                100% 60%,    /* Start of shoulder blockage */
                88% 72%,     /* Curving around shoulder */
                78% 100%,    /* Bottom edge cut */
                0% 100%      /* Bottom Left */
            );

            /* 3. REALISME: Menyesuaikan cahaya agar tidak terlalu "tempelan" */
            filter: brightness(0.85) contrast(1.1) saturate(0.9);
            box-shadow: inset 15px 0 30px rgba(0,0,0,0.7);
            border-left: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
        }

        /* Gaya Komponen HMI */
        .hmi-card {
            background: var(--panel-bg);
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .label { font-size: 0.65rem; color: #8b949e; letter-spacing: 1px; font-weight: bold; }
        .value { font-size: 2rem; font-weight: 800; color: var(--accent-blue); line-height: 1.1; }

        /* Animasi Flow */
        .pipe { height: 8px; background: #21262d; border-radius: 4px; overflow: hidden; margin: 8px 0; }
        .water { 
            height: 100%; width: 100%; 
            background: linear-gradient(90deg, transparent, var(--accent-blue), transparent);
            animation: moveFlow 1.5s linear infinite;
        }
        @keyframes moveFlow { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

        /* Status Label Foto */
        .sys-tag {
            position: absolute;
            bottom: 25px;
            left: 35px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.6);
            padding: 6px 15px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>

    <div class="monitor-frame">
        <div class="hmi-overlay">
            <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-2">
                <h2 class="text-xs font-black tracking-widest text-white">INVILA™ HMI SYSTEM</h2>
                <div id="clock" class="text-[10px] font-mono text-cyan-500 bg-cyan-950/30 px-2 py-0.5 rounded">00:00:00</div>
            </div>

            <div class="hmi-card">
                <p class="label">TOTAL PRODUCTION</p>
                <div class="flex items-baseline gap-2">
                    <span class="value" id="prod-num">1.246</span>
                    <span class="text-[10px] text-slate-500">m³</span>
                </div>
                <p class="text-[8px] text-green-500 mt-1 font-bold">● SYSTEM OPTIMAL</p>
            </div>

            <div class="hmi-card">
                <p class="label">TREATMENT FLOW RATE</p>
                <div class="pipe"><div class="water"></div></div>
                <div class="flex justify-between text-[7px] text-slate-500 uppercase">
                    <span>Intake</span>
                    <span>Processing</span>
                    <span>Output</span>
                </div>
            </div>

            <div class="hmi-card">
                <p class="label">WATER QUALITY (TDS)</p>
                <div class="value">185 <span class="text-xs font-normal text-slate-400">PPM</span></div>
            </div>

            <p class="text-[8px] text-slate-600 italic mt-4">
                Node: Semarang_Unit_04<br>
                PLC: Siemens S7-1200 Pro
            </p>
        </div>

        <div class="sys-tag">
            <div class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]"></div>
            <span class="text-[10px] font-bold text-white tracking-[0.2em]">DECN-IV™ SYSTEM LIVE</span>
        </div>
    </div>

    <script>
        // Update Jam Digital HMI
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID');
        }
        setInterval(updateTime, 1000);

        // Simulasi Angka Produksi Berjalan
        let production = 1246;
        setInterval(() => {
            production += Math.floor(Math.random() * 2);
            document.getElementById('prod-num').innerText = production.toLocaleString('id-ID');
        }, 5000);
    </script>
</body>
</html>
